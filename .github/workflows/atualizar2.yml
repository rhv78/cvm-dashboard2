name: Atualizar Dashboard CVM II

on:
  workflow_dispatch:
  schedule:
  - cron: "30 9 * * 1-5"   # 06:30 BRT (UTC-3)
  - cron: "30 12 * * 1-5"  # 09:30 BRT (UTC-3)


jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Deps
        run: pip install pandas requests

      - name: Cotas
        run: python coletar_cotas2.py

      - name: Verifica CSV
        run: ls -la output/ && wc -l output/cotas_fundos2_2026_consolidado.csv

      - name: Dashboard
        run: python gerar_dashboard2.py

      - name: Verifica HTML
        run: ls -la output/

      - name: Publica
        run: |
          mkdir -p docs/controle
          cp output/index2.html docs/controle/index.html
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "Dashboard II atualizado $(date -u +%Y-%m-%d' '%H:%M' UTC')" || echo "Nada a commitar"
          git push
